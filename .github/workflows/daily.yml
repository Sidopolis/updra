name: Updra Ecosystem Blitz

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Get base execution count
        id: base_count
        run: |
          if [ -f ecosystem-daily.md ]; then
            count=$(grep -oP '(?<=Execution #)\d+' ecosystem-daily.md | tail -1)
            count=${count:-0}
          else
            count=0
          fi
          echo "base=$count" >> $GITHUB_OUTPUT

      - name: Run 1000 commit loop
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          base=${{ steps.base_count.outputs.base }}
          total=$(git rev-list --count HEAD)

          for i in $(seq 1 1200); do
            exec_count=$((base + i))
            EXECUTION_COUNT=$exec_count python daily_update.py

            git add ecosystem-daily.md
            git commit -S -m "🌐 Ecosystem update #$exec_count — $(date -u +'%Y-%m-%dT%H:%M:%SZ') (total: $((total + i)))" || true
          done

      - name: Push all commits
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git push https://x-access-token:${{ secrets.PERSONAL_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
